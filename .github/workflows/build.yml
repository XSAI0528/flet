name: Build Android C++ SO

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Android NDK (官方原生方式)
      run: |
        echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV
        echo "NDK_PATH=$ANDROID_HOME/ndk/25.2.9519653" >> $GITHUB_ENV

    - name: Create Build Dir
      run: mkdir build

    - name: CMake Build (arm64-v8a)
      run: |
        cd build
        $ANDROID_HOME/cmake/3.22.1/bin/cmake .. \
          -DCMAKE_TOOLCHAIN_FILE=${{ env.ANDROID_NDK_ROOT }}/build/cmake/android.toolchain.cmake \
          -DANDROID_ABI=arm64-v8a \
          -DANDROID_PLATFORM=android-26 \
          -DCMAKE_BUILD_TYPE=Release
        make

    - name: Upload SO Artifact
      uses: actions/upload-artifact@v4
      with:
        name: libimgui_overlay-arm64-v8a
        path: build/libimgui_overlay.so
